name = "kitty"
version = "0.47.4"
description = "Emulador de terminal rápido baseado em GPU"
source = "https://github.com/kovidgoyal/kitty/archive/refs/tags/v0.47.4.tar.gz"
dependencies = ["harfbuzz", "zlib", "libpng"]

[phases]
build = """
# 1. Cria um diretório isolado para o nosso binário fake
mkdir -p /tmp/bin-fake

# 2. Escreve um script em Python que finge ser o fc-list do sistema,
# retornando exatamente a estrutura esperada pelo Kitty
cat << 'EOF' > /tmp/bin-fake/fc-list
#!/usr/bin/env python3
import sys
# Se o Kitty pedir especificamente propriedades, simulamos o output correto
if ':' in ' '.join(sys.argv):
    print("/usr/share/fonts/TTF/DejaVuSansMono.ttf: DejaVu Sans Mono:style=Book:spacing=100")
else:
    print("DejaVu Sans Mono")
EOF

# 3. Dá permissão de execução para o nosso fc-list falso
chmod +x /tmp/bin-fake/fc-list

# 4. Injeta a pasta no INÍCIO do PATH absoluto
export PATH=/tmp/bin-fake:$PATH

# 5. Desativa travas conhecidas do Kitty
export KITTY_NO_FONTCONFIG_CHECK=1

# 6. Roda o build do Kitty
python3 setup.py linux-package
"""
package = """
mkdir -p $pkgdir/usr
cp -r linux-package/* $pkgdir/usr/
"""
