name = "kitty"
version = "0.47.4"
description = "Emulador de terminal rápido baseado em GPU"
source = "https://github.com/kovidgoyal/kitty/archive/refs/tags/v0.47.4.tar.gz"
dependencies = ["harfbuzz", "zlib", "libpng"]

[phases]
build = """
# 1. Cria uma árvore local simulando uma estrutura limpa de fontes
mkdir -p /tmp/kitty-fake-env/fonts
mkdir -p /tmp/kitty-fake-env/cache

# 2. Gera um arquivo XML de Fontconfig perfeitamente legítimo e estruturado
cat << 'EOF' > /tmp/kitty-fake-env/fonts.conf
<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
    <dir>/tmp/kitty-fake-env/fonts</dir>
    <cachedir>/tmp/kitty-fake-env/cache</cachedir>
</fontconfig>
EOF

# 3. Aponta o Fontconfig do sistema para usar única e exclusivamente este arquivo XML isolado
export FONTCONFIG_FILE=/tmp/kitty-fake-env/fonts.conf
export FONTCONFIG_SYSROOT=/tmp/kitty-fake-env

# 4. Roda o build do Kitty sem nenhuma interferência das fontes do seu sistema operacional
python3 setup.py linux-package
"""
package = """
mkdir -p $pkgdir/usr
cp -r linux-package/* $pkgdir/usr/
"""
