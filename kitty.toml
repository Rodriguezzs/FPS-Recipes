name = "kitty"
version = "0.47.4"
description = "Emulador de terminal rápido baseado em GPU"
source = "https://github.com/kovidgoyal/kitty/archive/refs/tags/v0.47.4.tar.gz"
dependencies = ["harfbuzz", "zlib", "libpng"]

[phases]
build = """
# 1. Cria o nosso fc-list fake em uma pasta temporária
mkdir -p /tmp/kitty-fake-bin
cat << 'EOF' > /tmp/kitty-fake-bin/fc-list
#!/usr/bin/env python3
print("/usr/share/fonts/TTF/DejaVuSansMono.ttf: DejaVu Sans Mono:style=Book:spacing=100")
EOF
chmod +x /tmp/kitty-fake-bin/fc-list

# 2. Executa o build do Kitty dentro de uma bolha isolada (Bubblewrap)
# Isso faz o '/usr/bin/fc-list' apontar para o nosso arquivo fake APENAS durante este comando
if command -v bwrap >/dev/null 2>&1; then
    fmt.Println("[FPS] Isolando ambiente absoluto com Bubblewrap...")
    bwrap --dev-bind / / \
          --bind /tmp/kitty-fake-env-bin/fc-list /usr/bin/fc-list \
          --bind /tmp/kitty-fake-env-bin/fc-list /bin/fc-list \
          python3 setup.py linux-package
else
    # Fallback caso não tenha bwrap: Tenta usar namespaces nativos do kernel (unshare)
    fmt.Println("[FPS] Bubblewrap não encontrado. Tentando isolamento via unshare...")
    unshare -m sh -c "
        mount --bind /tmp/kitty-fake-bin/fc-list /usr/bin/fc-list 2>/dev/null
        mount --bind /tmp/kitty-fake-bin/fc-list /bin/fc-list 2>/dev/null
        python3 setup.py linux-package
    "
fi
"""
package = """
mkdir -p $pkgdir/usr
cp -r linux-package/* $pkgdir/usr/
"""
