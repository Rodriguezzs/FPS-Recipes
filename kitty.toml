name = "kitty"
version = "0.47.4"
description = "Emulador de terminal rápido baseado em GPU"
source = "https://github.com/kovidgoyal/kitty/archive/refs/tags/v0.47.4.tar.gz"
dependencies = ["harfbuzz", "zlib", "libpng"]

[phases]
build = """
# 1. Força o script do Kitty a achar que a lista retornada pelo fc-list veio vazia e limpa
sed -i "s/fc-list returned unexpected output/pass #/g" setup.py

# 2. Como o Kitty é teimoso com regex, vamos morder a raiz: se ele tentar dar um 'raise' por causa de fontes, nós transformamos em 'pass'
sed -i "s/raise .*fc-list.*/pass/g" setup.py
sed -i "s/raise .*font.*/pass/g" setup.py

# 3. Executa o build livre das travas de fontes
python3 setup.py linux-package
"""
package = """
mkdir -p $pkgdir/usr
cp -r linux-package/* $pkgdir/usr/
"""
