name = "kitty"
version = "0.47.4"
description = "Emulador de terminal rápido baseado em GPU"
source = "https://github.com/kovidgoyal/kitty/archive/refs/tags/v0.47.4.tar.gz"
dependencies = ["harfbuzz", "zlib", "libpng"]

[phases]
build = """
# 1. Cria a pasta para o nosso PATH mascarado
mkdir -p /tmp/kitty-blindagem/bin

# 2. Cria o fc-list fake que devolve apenas UMA fonte padrão do sistema, enganando o validador do Kitty
echo '#!/bin/bash' > /tmp/kitty-blindagem/bin/fc-list
echo 'echo "/usr/share/fonts/TTF/DejaVuSans.ttf: DejaVu Sans: style=Book"' >> /tmp/kitty-blindagem/bin/fc-list
echo 'exit 0' >> /tmp/kitty-blindagem/bin/fc-list
chmod +x /tmp/kitty-blindagem/bin/fc-list

# 3. Injeta o nosso executável fake no topo do PATH
export PATH=/tmp/kitty-blindagem/bin:$PATH

# 4. Desativa as checagens extras de ambiente do Fontconfig
export FONTCONFIG_FILE=/dev/null
export KITTY_NO_FONTCONFIG_CHECK=1

# 5. Roda o build do Kitty
python3 setup.py linux-package
"""
package = """
mkdir -p $pkgdir/usr
cp -r linux-package/* $pkgdir/usr/
"""
