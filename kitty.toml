name = "kitty"
version = "0.47.4"
description = "Emulador de terminal rápido baseado em GPU"
source = "https://github.com/kovidgoyal/kitty/archive/refs/tags/v0.47.4.tar.gz"
dependencies = ["harfbuzz", "zlib", "libpng"]

[phases]
build = """
# 1. Usa o sed para comentar a linha do setup.py que valida as fontes e joga o erro
# Ele vai procurar a checagem do fc-list e desativá-la direto no código fonte do Kitty
sed -i 's/raise BSDException.*fc-list returned unexpected output.*/pass/g' setup.py
sed -i 's/print.*fc-list returned unexpected output.*/pass/g' setup.py

# 2. Garante que as variáveis de ambiente fiquem limpas
unset FONTCONFIG_FILE
export KITTY_NO_FONTCONFIG_CHECK=1

# 3. Roda o build do Kitty livre de checagens quebradas
python3 setup.py linux-package
"""
package = """
mkdir -p $pkgdir/usr
cp -r linux-package/* $pkgdir/usr/
"""
